<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Activate Your Account</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
        "
    >
        <table
            width="100%"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="background-color: #000; padding: 20px 0"
        >
            <tr>
                <td align="center">
                    <!-- Card -->
                    <table
                        width="400"
                        cellpadding="0"
                        cellspacing="0"
                        border="0"
                        style="
                            background-color: #0a0a0a;
                            border: 1px solid #262626;
                            border-radius: 8px;
                            overflow: hidden;
                        "
                    >
                        <!-- Header Image -->
                        <tr>
                            <td>
                                <img
                                    src="https://images.unsplash.com/photo-1556204975-1851fadab092?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
                                    alt="Activation"
                                    width="100%"
                                    style="display: block; opacity: 0.4"
                                />
                            </td>
                        </tr>

                        <!-- Content -->
                        <tr>
                            <td
                                style="
                                    padding: 24px;
                                    text-align: center;
                                    color: #d4d4d4;
                                "
                            >
                                <h1 style="color: #ffffff; margin-bottom: 10px">
                                    Activate Your Account
                                </h1>

                                <p style="color: #a3a3a3; margin-bottom: 20px">
                                    Hi {{username}},<br />
                                    Click the button below to activate your
                                    account.
                                </p>

                                <!-- Username -->
                                <div
                                    style="
                                        background: #171717;
                                        border: 1px solid #262626;
                                        padding: 10px;
                                        margin-bottom: 10px;
                                    "
                                >
                                    <p
                                        style="
                                            margin: 0;
                                            font-size: 12px;
                                            color: #a3a3a3;
                                        "
                                    >
                                        Username
                                    </p>
                                    <p style="margin: 5px 0 0; font-size: 13px">
                                        {{username}}
                                    </p>
                                </div>

                                <!-- Token -->
                                <div
                                    style="
                                        background: #171717;
                                        border: 1px solid #262626;
                                        padding: 10px;
                                        margin-bottom: 20px;
                                    "
                                >
                                    <p
                                        style="
                                            margin: 0;
                                            font-size: 12px;
                                            color: #a3a3a3;
                                        "
                                    >
                                        Activation Token
                                    </p>
                                    <p
                                        style="
                                            margin: 5px 0 0;
                                            font-size: 12px;
                                            word-break: break-all;
                                        "
                                    >
                                        {{token}}
                                    </p>
                                </div>

                                <!-- Button (GET request) -->
                                <a
                                    href="{{token}}"
                                    style="
                                        display: inline-block;
                                        background-color: #dc2626;
                                        color: #ffffff;
                                        padding: 12px 20px;
                                        text-decoration: none;
                                        border-radius: 6px;
                                        font-size: 14px;
                                    "
                                >
                                    Activate Account
                                </a>

                                <p
                                    style="
                                        margin-top: 20px;
                                        font-size: 12px;
                                        color: #737373;
                                    "
                                >
                                    If you didn’t request this, you can safely
                                    ignore this email.
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
